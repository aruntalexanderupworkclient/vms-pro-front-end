<div class="organisation-page">
  <!-- Page Header -->
  <div class="page-title">
    <h1>Organisations</h1>
    <p class="subtitle">Manage organisations</p>
  </div>

  <!-- Card with Table -->
  <div class="card table-card">
    <div class="card-header">
      <div class="header-left">
        <h3>Organisations</h3>
        <span class="record-count" *ngIf="!loading">{{ totalCount }} record{{ totalCount !== 1 ? 's' : '' }}</span>
      </div>
      <div class="header-right">
        <div class="search-box">
          <span class="material-icons search-icon">search</span>
          <input type="text" placeholder="Search organisations..." [ngModel]="search" (ngModelChange)="onSearchChange($event)">
        </div>
        <button class="btn btn-primary" (click)="openAdd()">
          <span class="material-icons">add</span>
          Add New
        </button>
      </div>
    </div>

    <!-- Loading Spinner -->
    <div class="loading-container" *ngIf="loading">
      <div class="spinner"></div>
    </div>

    <!-- Table -->
    <table class="data-table" *ngIf="!loading">
      <thead>
        <tr>
          <th>Name</th>
          <th>Type</th>
          <th>Address</th>
          <th class="actions-col">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of items">
          <td><strong>{{ item.name }}</strong></td>
          <td>{{ item.typeLabel }}</td>
          <td>{{ item.address }}</td>
          <td>
            <div class="action-btns">
              <button class="icon-btn" (click)="openEdit(item)" title="Edit">
                <span class="material-icons">edit</span>
              </button>
              <button class="icon-btn danger" (click)="deleteItem(item)" title="Delete">
                <span class="material-icons">delete</span>
              </button>
            </div>
          </td>
        </tr>
        <tr *ngIf="items.length === 0">
          <td colspan="4" class="empty-row">No organisations found</td>
        </tr>
      </tbody>
    </table>

    <!-- Pagination -->
    <div class="pagination" *ngIf="!loading && totalPages > 1">
      <button class="page-btn" [disabled]="!hasPreviousPage" (click)="goToPage(page - 1)">
        <span class="material-icons">chevron_left</span>
      </button>
      <button class="page-btn" *ngFor="let p of pageNumbers"
              [class.active]="p === page"
              (click)="goToPage(p)">
        {{ p }}
      </button>
      <button class="page-btn" [disabled]="!hasNextPage" (click)="goToPage(page + 1)">
        <span class="material-icons">chevron_right</span>
      </button>
      <span class="page-info">Page {{ page }} of {{ totalPages }}</span>
    </div>
  </div>
</div>
