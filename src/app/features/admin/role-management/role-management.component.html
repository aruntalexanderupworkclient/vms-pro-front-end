<div class="role-management">
  <div class="page-header">
    <h2 style="margin:0">Role Management</h2>
    <button class="btn btn-primary" (click)="openAddRole()">
      <span class="material-icons">add</span>
      Add Role
    </button>
  </div>

  <div class="card table-card">
    <table class="data-table">
      <thead>
        <tr>
          <th>Role Name</th>
          <th>Description</th>
          <th>Users Count</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let role of roles">
          <td><strong>{{ role.name }}</strong></td>
          <td>{{ role.description }}</td>
          <td><span class="badge badge-blue">{{ role.usersCount }}</span></td>
          <td>
            <div class="action-btns">
              <button class="icon-btn" (click)="openEditRole(role)" title="Edit">
                <span class="material-icons">edit</span>
              </button>
              <button class="icon-btn danger" (click)="deleteRole(role)" title="Delete">
                <span class="material-icons">delete</span>
              </button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Modal -->
  <div class="overlay-backdrop" *ngIf="showModal" (click)="closeModal()"></div>
  <div class="modal-panel" *ngIf="showModal">
    <div class="panel-header">
      <h2>{{ editMode ? 'Edit Role' : 'Add Role' }}</h2>
      <button class="icon-btn" (click)="closeModal()">
        <span class="material-icons">close</span>
      </button>
    </div>

    <form (ngSubmit)="saveRole()">
      <div class="form-group">
        <label>Role Name</label>
        <input type="text" [(ngModel)]="currentRole.name" name="name" required>
      </div>
      <div class="form-group">
        <label>Description</label>
        <input type="text" [(ngModel)]="currentRole.description" name="description">
      </div>

      <!-- Permission Matrix -->
      <h3 style="margin-top:24px;">Permission Matrix</h3>
      <table class="permission-matrix">
        <thead>
          <tr>
            <th>Module</th>
            <th *ngFor="let action of permissionActions">{{ action | titlecase }}</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let mod of permissionModules">
            <td>{{ mod.label }}</td>
            <td *ngFor="let action of permissionActions">
              <input type="checkbox"
                     [checked]="getPermission(mod.key, action)"
                     (change)="togglePermission(mod.key, action)">
            </td>
          </tr>
        </tbody>
      </table>

      <div class="panel-footer">
        <button type="button" class="btn btn-secondary" (click)="closeModal()">Cancel</button>
        <button type="submit" class="btn btn-primary">Save</button>
      </div>
    </form>
  </div>
</div>
