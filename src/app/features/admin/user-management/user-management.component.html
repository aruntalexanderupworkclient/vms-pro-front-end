<div class="user-management">
  <!-- Header -->
  <div class="page-header">
    <div class="header-left">
      <div class="search-box">
        <span class="material-icons">search</span>
        <input type="text" placeholder="Search users..." [(ngModel)]="searchTerm" (ngModelChange)="applyFilters()">
      </div>
      <select [(ngModel)]="roleFilter" (ngModelChange)="applyFilters()">
        <option value="">All Roles</option>
        <option *ngFor="let r of roles" [value]="r">{{ r.name }}</option>
      </select>
    </div>
    <button class="btn btn-primary" (click)="openAddUser()">
      <span class="material-icons">add</span>
      Add User
    </button>
  </div>

  <!-- Table -->
  <div class="card table-card">
    <table class="data-table">
      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Role</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let user of filteredUsers">
          <td>
            <div class="user-cell">
              <div class="avatar">{{ getInitials(user.fullName) }}</div>
              <span>{{ user.fullName }}</span>
            </div>
          </td>
          <td>{{ user.email }}</td>
          <td><span [class]="getRoleBadgeClass(user.roleName)">{{ user.roleName }}</span></td>
          <td>
            <label class="toggle">
              <input type="checkbox" [checked]="user.status === 0" (change)="toggleStatus(user)">
              <span class="toggle-slider"></span>
            </label>
          </td>
          <td>
            <div class="action-btns">
              <button class="icon-btn" (click)="openEditUser(user)" title="Edit">
                <span class="material-icons">edit</span>
              </button>
              <button class="icon-btn danger" (click)="deleteUser(user)" title="Delete">
                <span class="material-icons">delete</span>
              </button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Slide-over Panel -->
  <div class="overlay-backdrop" *ngIf="showPanel" (click)="closePanel()"></div>
  <div class="slide-over" *ngIf="showPanel">
    <div class="panel-header">
      <h2>{{ editMode ? 'Edit User' : 'Add User' }}</h2>
      <button class="icon-btn" (click)="closePanel()">
        <span class="material-icons">close</span>
      </button>
    </div>
    <form (ngSubmit)="saveUser()">
      <div class="form-grid">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" [(ngModel)]="currentUser.fullName" name="fullName" required>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" [(ngModel)]="currentUser.email" name="email" required>
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input type="tel" [(ngModel)]="currentUser.phone" name="phone">
        </div>
        <div class="form-group">
          <label>Role</label>
          <select [(ngModel)]="currentUser.roleId" name="roleId">
            <option *ngFor="let r of roles" [value]="r.id">{{ r.name }}</option>
          </select>
        </div>
        <div class="form-group">
          <label>Status</label>
          <select [(ngModel)]="currentUser.status" name="status">
            <option [ngValue]="0">Active</option>
            <option [ngValue]="1">Inactive</option>
            <option [ngValue]="2">Suspended</option>
            <option [ngValue]="3">Deleted</option>
          </select>
        </div>
      </div>
      <div class="panel-footer">
        <button type="button" class="btn btn-secondary" (click)="closePanel()">Cancel</button>
        <button type="submit" class="btn btn-primary">Save</button>
      </div>
    </form>
  </div>
</div>
