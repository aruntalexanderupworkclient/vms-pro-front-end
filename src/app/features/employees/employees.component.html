<div class="employees">
  <div class="page-header">
    <div class="search-box">
      <span class="material-icons">search</span>
      <input type="text" placeholder="Search employees..." [(ngModel)]="searchTerm" (ngModelChange)="applyFilter()">
    </div>
    <button class="btn btn-primary" (click)="openAdd()">
      <span class="material-icons">person_add</span>
      Add Employee
    </button>
  </div>

  <div class="card table-card">
    <table class="data-table">
      <thead>
        <tr>
          <th>Employee</th>
          <th>Department</th>
          <th>Designation</th>
          <th>Employee ID</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let emp of filteredEmployees">
          <td>
            <div style="display:flex;align-items:center;gap:10px;">
              <div class="avatar">{{ getInitials(emp.name) }}</div>
              {{ emp.name }}
            </div>
          </td>
          <td>{{ emp.department }}</td>
          <td>{{ emp.designation }}</td>
          <td><span class="badge badge-blue">{{ emp.employeeId }}</span></td>
          <td>
            <span [class]="emp.status ? 'badge badge-green' : 'badge badge-red'">
              {{ emp.status ? 'Active' : 'Inactive' }}
            </span>
          </td>
          <td>
            <div class="action-btns">
              <button class="icon-btn" (click)="openEdit(emp)"><span class="material-icons">edit</span></button>
              <button class="icon-btn danger" (click)="deleteEmployee(emp)"><span class="material-icons">delete</span></button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Slide-over -->
  <div class="overlay-backdrop" *ngIf="showPanel" (click)="closePanel()"></div>
  <div class="slide-over" *ngIf="showPanel">
    <div class="panel-header">
      <h2>{{ editMode ? 'Edit Employee' : 'Add Employee' }}</h2>
      <button class="icon-btn" (click)="closePanel()"><span class="material-icons">close</span></button>
    </div>
    <form (ngSubmit)="save()">
      <div class="form-group"><label>Full Name</label><input type="text" [(ngModel)]="currentEmployee.name" name="name" required></div>
      <div class="form-group"><label>Email</label><input type="email" [(ngModel)]="currentEmployee.email" name="email"></div>
      <div class="form-group"><label>Phone</label><input type="tel" [(ngModel)]="currentEmployee.phone" name="phone"></div>
      <div class="form-group"><label>Department</label><input type="text" [(ngModel)]="currentEmployee.department" name="department"></div>
      <div class="form-group"><label>Designation</label><input type="text" [(ngModel)]="currentEmployee.designation" name="designation"></div>
      <div class="form-group"><label>Employee ID</label><input type="text" [(ngModel)]="currentEmployee.employeeId" name="employeeId"></div>
      <div class="form-group">
        <label>Status</label>
        <select [(ngModel)]="currentEmployee.status" name="status">
          <option [ngValue]="true">Active</option>
          <option [ngValue]="false">Inactive</option>
        </select>
      </div>
      <div class="panel-footer">
        <button type="button" class="btn btn-secondary" (click)="closePanel()">Cancel</button>
        <button type="submit" class="btn btn-primary">Save</button>
      </div>
    </form>
  </div>
</div>
